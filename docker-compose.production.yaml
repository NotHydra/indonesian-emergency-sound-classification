services:
    website-production:
        container_name: indonesian-emergency-sound-classification-website-production

        build:
            context: ./website
            target: production
            args:
                NEXT_PUBLIC_CLASSIFICATION_URL: ${NEXT_PUBLIC_WEBSITE_CLASSIFICATION_URL}

        env_file:
            - .env

        environment:
            - PORT=${WEBSITE_PORT}
            - NEXT_PUBLIC_CLASSIFICATION_URL=${NEXT_PUBLIC_WEBSITE_CLASSIFICATION_URL}

        restart: always

        healthcheck:
            test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:${WEBSITE_PORT} || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s

        networks:
            - default
        
        labels:
        - "traefik.http.services.website-production.loadbalancer.server.port=3000"
  

    server-production:
        container_name: indonesian-emergency-sound-classification-server-production

        build:
            context: ./server
            target: production
            args:
                - MODEL_URL=${MODEL_URL}

        env_file:
            - .env

        environment:
            - PORT=${SERVER_PORT}

        restart: always

        healthcheck:
            test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:${SERVER_PORT} || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s

        networks:
            - default

        labels:
            - "traefik.http.services.server-production.loadbalancer.server.port=3001"

networks:
    default:
        driver: bridge
