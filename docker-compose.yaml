services:
    website-development:
        container_name: indonesian-emergency-sound-classification-website-development

        profiles:
            - development

        build:
            context: ./website
            target: development

        env_file:
            - .env

        environment:
            - PORT=${WEBSITE_PORT}
            - NEXT_PUBLIC_CLASSIFICATION_URL=${NEXT_PUBLIC_WEBSITE_CLASSIFICATION_URL}

        volumes:
            - ./website/src:/app/src
            - ./website/public:/app/public

        restart: always

        ports:
            - ${WEBSITE_PORT}:${WEBSITE_PORT}

        healthcheck:
            test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:${WEBSITE_PORT} || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s

    website-production:
        container_name: indonesian-emergency-sound-classification-website-production

        profiles:
            - production

        build:
            context: ./website
            target: production
            args:
                - NEXT_PUBLIC_CLASSIFICATION_URL=${NEXT_PUBLIC_WEBSITE_CLASSIFICATION_URL}

        env_file:
            - .env

        environment:
            - PORT=${WEBSITE_PORT}
            - NEXT_PUBLIC_CLASSIFICATION_URL=${NEXT_PUBLIC_WEBSITE_CLASSIFICATION_URL}

        restart: always

        ports:
            - ${WEBSITE_PORT}:${WEBSITE_PORT}

        healthcheck:
            test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:${WEBSITE_PORT} || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s

        networks:
            - app_network

    server-development:
        container_name: indonesian-emergency-sound-classification-server-development

        profiles:
            - development

        build:
            context: ./server
            target: development

        env_file:
            - .env

        environment:
            - PORT=${SERVER_PORT}

        volumes:
            - ./server/src:/app/src

        restart: always

        ports:
            - ${SERVER_PORT}:${SERVER_PORT}

        healthcheck:
            test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:${SERVER_PORT} || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s

    server-production:
        container_name: indonesian-emergency-sound-classification-server-production

        profiles:
            - production

        build:
            context: ./server
            target: production

        env_file:
            - .env

        environment:
            - PORT=${SERVER_PORT}

        restart: always

        ports:
            - ${SERVER_PORT}:${SERVER_PORT}

        healthcheck:
            test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:${SERVER_PORT} || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s

        networks:
            - app_network

networks:
    app_network:
        driver: bridge
